name: CI/CD

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/service-reliability-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/service-reliability-frontend

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: service_reliability_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tracker -d service_reliability_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://tracker:tracker@localhost:5432/service_reliability_test
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: pytest tests/ -v

  # ── 2. Build & push images ─────────────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── 3. Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: >-
            DOCKERHUB_USERNAME,
            IMAGE_TAG,
            POSTGRES_USER,
            POSTGRES_PASSWORD,
            POSTGRES_DB,
            SECRET_KEY,
            ANTHROPIC_API_KEY
          script: |
            set -e
            cd ~/service-reliability-app

            # Pull updated images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/service-reliability-backend:${{ needs.build.outputs.image_tag }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/service-reliability-frontend:${{ needs.build.outputs.image_tag }}

            # Write env file for compose (avoids shell escaping issues with special chars)
            cat > .env.prod <<EOF
DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
IMAGE_TAG=${{ needs.build.outputs.image_tag }}
POSTGRES_USER=${{ secrets.POSTGRES_USER }}
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
POSTGRES_DB=${{ secrets.POSTGRES_DB }}
DATABASE_URL=postgresql+asyncpg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}
SECRET_KEY=${{ secrets.SECRET_KEY }}
ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
EOF

            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans

            # Remove env file immediately after use
            rm -f .env.prod

            # Clean up dangling images
            docker image prune -f
